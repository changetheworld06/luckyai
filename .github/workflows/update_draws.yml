name: Update FDJ draws

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run update_draws.py
        run: python update_draws.py

      - name: Detect CSV changes
        id: diff
        run: |
          changed="$(git status --porcelain loto_cleaned.csv euromillions_cleaned.csv)"
          echo "changed<<EOF" >> "$GITHUB_OUTPUT"
          echo "$changed" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Commit and push updated CSVs
        if: steps.diff.outputs.changed != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add loto_cleaned.csv euromillions_cleaned.csv
          git commit -m "chore(data): update FDJ draws [skip ci]"
          git push origin main
